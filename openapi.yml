        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomFieldGroupRequest"
      responses:
        "201":
          description: Custom field group created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomFieldGroupResponse"
        "409":
          description: Group name conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/custom-field-groups/{id}:
    get:
      summary: Get custom field group
      operationId: getCustomFieldGroup
      tags:
        - custom-fields
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Custom field group with member fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomFieldGroupResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    patch:
      summary: Update custom field group
      operationId: updateCustomFieldGroup
      tags:
        - custom-fields
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCustomFieldGroupRequest"
      responses:
        "200":
          description: Custom field group updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomFieldGroupResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Group name conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: Delete custom field group
      operationId: deleteCustomFieldGroup
      tags:
        - custom-fields
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Custom field group deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ========= Auth Schemas =========

    LoginLinkRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Email address of the user to send the login link to
      required:
        - email

    RefreshTokenRequest:
      type: object
      properties:
        refreshToken:
          type: string
          description: JWT refresh token
      required:
        - refreshToken

    LoginRequest:
      type: object
      properties:
        organizationId:
          type: string
          format: uuid
          description: Organization ID to login to
        email:
          type: string
          format: email
          description: User's email address
        password:
          type: string
          description: User's password
        twoFactorAuthCode:
          type: string
      required:
        - email
        - password

    ForgotPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: User's email address
      required:
        - email

    AuthMultiResponse:
      oneOf:
        - $ref: "#/components/schemas/AuthResponse"
        - $ref: "#/components/schemas/AvailableOrganizationsResponse"

    ResetPasswordRequest:
      type: object
      properties:
        token:
          type: string
          description: Password reset token
        newPassword:
          type: string
          minLength: 8
          description: New password (minimum 8 characters)
      required:
        - token
        - newPassword

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: JWT access token
        refreshToken:
          type: string
          description: JWT refresh token
        twoFactorAuthToken:
          type: string
          description: Temporary token for 2FA verification (if applicable)
        twoFactorAuthRequired:
          type: boolean

    ResetPasswordResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Whether the password reset was successful

    ResetPasswordMultiResponse:
      oneOf:
        - $ref: "#/components/schemas/AvailableOrganizationsResponse"
        - $ref: "#/components/schemas/ResetPasswordResponse"

    TwoFactorSetupResponse:
      type: object
      properties:
        secret:
          type: string
          description: TOTP secret key
        qrCode:
          type: string
          description: Base64 encoded QR code image
        uri:
          type: string
          description: TOTP URI for manual setup

    TwoFactorEnableRequest:
      type: object
      properties:
        code:
          type: string
          description: TOTP code to verify setup
      required:
        - code

    TwoFactorDisableRequest:
      type: object
      properties:
        code:
          type: string
          description: TOTP code to verify disable request
      required:
        - code

    TwoFactorStatusResponse:
      type: object
      properties:
        enabled:
          type: boolean
          description: Whether 2FA is enabled

    TwoFactorVerifyRequest:
      type: object
      properties:
        organizationId:
          type: string
          format: uuid
        token:
          type: string
          description: Temporary token or OTP from initial auth
        code:
          type: string
          description: TOTP code to verify (optional for OTP flow)
      required:
        - token

    # ========= Common Schemas =========

    Error:
      type: object
      properties:
        code:
          type: integer
          description: Error code
        message:
          type: string
          description: Human-readable error message
        timestamp:
          type: string
          format: date-time
          description: Timestamp when the error occurred
        path:
          type: string
          description: Request path that caused the error

    Timestamp:
      type: string
      format: date-time
      description: Timestamp in ISO 8601 format

    PaginatedResponse:
      type: object
      properties:
        page:
          type: integer
          description: Current page number (zero-based)
        size:
          type: integer
          description: Number of items per page
        totalElements:
          type: integer
          format: int64
          description: Total number of elements
        totalPages:
          type: integer
          description: Total number of pages

    # ========= User Schemas =========

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the user
        email:
          type: string
          description: Email address of the user
        firstName:
          type: string
          description: User's first name
        lastName:
          type: string
          description: User's last name
        phone:
          type: string
          description: User's phone number
        avatarUrl:
          type: string
          format: uri
          description: URL to the user's avatar image
        roles:
          type: array
          items:
            $ref: "#/components/schemas/UserRole"
          description: User's roles
        isActive:
          type: boolean
          description: Whether the user is active
        twoFactorAuthEnabled:
          type: boolean
          description: Whether two-factor authentication is enabled
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"

    CurrentUser:
      allOf:
        - $ref: "#/components/schemas/User"
        - type: object
          properties:
            organizationId:
              type: string
              format: uuid
              description: The current organization ID the user is operating in

    UserRole:
      type: string
      enum:
        - PLATFORM_ADMIN
        - OWNER
        - ADMIN
        - MEMBER
        - VIEWER
        - ACCOUNTANT

    CreateUserRequest:
      type: object
      required:
        - email
        - firstName
        - roles
      properties:
        organizationId:
          type: string
          format: uuid
          description: Organization ID
        email:
          type: string
          format: email
          description: Email address of the user
        firstName:
          type: string
          description: User's first name
        lastName:
          type: string
          description: User's last name
        phone:
          type: string
          description: User's phone number
        roles:
          type: array
          items:
            $ref: "#/components/schemas/UserRole"
        sendEmail:
          type: boolean
          description: Whether to send an invitation email to the user

    UpdateUserRequest:
      type: object
      properties:
        firstName:
          type: string
          nullable: true
          description: User's first name
        lastName:
          type: string
          nullable: true
          description: User's last name
        phone:
          type: string
          nullable: true
          description: User's phone number
        avatarUrl:
          type: string
          format: uri
          nullable: true
          description: URL to the user's avatar image
        roles:
          nullable: true
          type: array
          items:
            $ref: "#/components/schemas/UserRole"
          description: User's roles
      description: Request to update user profile information

    UpdatePasswordRequest:
      type: object
      properties:
        oldPassword:
          type: string
          description: Current password
        newPassword:
          type: string
          description: New password
        twoFactorAuthCode:
          type: string
          description: 2FA code (if applicable)

    UserAuthMethods:
      type: object
      properties:
        passwordEnabled:
          type: boolean
          description: Whether password authentication is enabled
        loginLinkEnabled:
          type: boolean
          description: Whether login link authentication is enabled
        googleEnabled:
          type: boolean
          description: Whether Google OAuth authentication is enabled

    UpdateAuthMethodsRequest:
      type: object
      properties:
        passwordEnabled:
          type: boolean
          description: Enable or disable password authentication
        loginLinkEnabled:
          type: boolean
          description: Enable or disable login link authentication
        googleEnabled:
          type: boolean
          description: Enable or disable Google OAuth authentication
        twoFactorAuthCode:
          type: string
          description: 2FA code (required if 2FA is active)

    UserEmailPreferences:
      type: object
      properties:
        email:
          type: string
          format: email
          description: User's email address
        preferences:
          type: object
          additionalProperties: true

    PaginatedUserResponse:
      allOf:
        - $ref: "#/components/schemas/PaginatedResponse"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/User"
              description: List of users

    # ========= Organization Schemas =========

    Organization:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Organization ID
        name:
          type: string
          description: Organization name
        slug:
          type: string
          description: URL-friendly identifier for the organization
        isActive:
          type: boolean
          description: Whether the organization is active
        settings:
          type: object
          additionalProperties: true
          description: Organization-level settings
        billingInfo:
          type: object
          additionalProperties: true
          description: Organization billing information
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"

    AvailableOrganizationResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Organization ID
        name:
          type: string
          description: Organization name

    AvailableOrganizationsResponse:
      type: object
      properties:
        organizations:
          type: array
          items:
            $ref: "#/components/schemas/AvailableOrganizationResponse"
          description: List of available organizations for the user

    SwitchOrganizationRequest:
      type: object
      properties:
        organizationId:
          type: string
          format: uuid
          description: Organization ID to switch to

    CreateOrganizationRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Organization name
        slug:
          type: string
          description: URL-friendly identifier for the organization

    UpdateOrganizationRequest:
      type: object
      properties:
        name:
          nullable: true
          type: string
          description: Organization name
        slug:
          nullable: true
          type: string
          description: URL-friendly identifier for the organization
        isActive:
          nullable: true
          type: boolean
          description: Whether the organization is active
        settings:
          nullable: true
          type: object
          additionalProperties: true
          description: Organization-level settings
        billingInfo:
          nullable: true
          type: object
          additionalProperties: true
          description: Organization billing information

    PaginatedOrganizationResponse:
      allOf:
        - $ref: "#/components/schemas/PaginatedResponse"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/Organization"
              description: List of organizations

    PaginatedAvailableOrganizationResponse:
      allOf:
        - $ref: "#/components/schemas/PaginatedResponse"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/AvailableOrganizationResponse"
              description: List of available organizations for the user

    # ========= Organization Member Schemas =========

    OrganizationMember:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Membership ID
        organizationId:
          type: string
          format: uuid
          description: Organization ID
        userId:
          type: string
          format: uuid
          description: User ID
        userEmail:
          type: string
          description: User's email address
        userFirstName:
          type: string
          description: User's first name
        userLastName:
          type: string
          description: User's last name
        role:
          $ref: "#/components/schemas/UserRole"
        isActive:
          type: boolean
          description: Whether the membership is active
        joinedAt:
          type: string
          format: date-time
          description: Timestamp when the member joined
        invitedAt:
          type: string
          format: date-time
          description: Timestamp when the member was invited

    AddOrganizationMemberRequest:
      type: object
      required:
        - email
        - role
      properties:
        email:
          type: string
          format: email
          description: Email address of the user to add
        role:
          $ref: "#/components/schemas/UserRole"

    UpdateOrganizationMemberRequest:
      type: object
      properties:
        role:
          $ref: "#/components/schemas/UserRole"
        isActive:
          type: boolean
          description: Whether the membership is active

    PaginatedOrganizationMemberResponse:
      allOf:
        - $ref: "#/components/schemas/PaginatedResponse"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/OrganizationMember"
              description: List of organization members

    # ========= Tag Schemas =========

    TagGroupResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        color:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            $ref: "#/components/schemas/TagSummary"
        referenceCount:
          type: integer
          format: int64
        createdAt:
          $ref: "#/components/schemas/Timestamp"

    TagSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        color:
          type: string

    TagResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        color:
          type: string
        referenceCount:
          type: integer
          format: int64
        createdAt:
          $ref: "#/components/schemas/Timestamp"

    CreateTagGroupRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 100
        color:
          type: string
          maxLength: 7
        description:
          type: string
        tagIds:
          type: array
          items:
            type: string
            format: uuid

    UpdateTagGroupRequest:
      type: object
      properties:
        name:
          type: string
          nullable: true
          maxLength: 100
        color:
          type: string
          nullable: true
          maxLength: 7
        description:
          type: string
          nullable: true
        tagIds:
          type: array
          nullable: true
          items:
            type: string
            format: uuid

    CreateTagRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 100
        color:
          type: string
          maxLength: 7

    UpdateTagRequest:
      type: object
      properties:
        name:
          type: string
          nullable: true
          maxLength: 100
        color:
          type: string
          nullable: true
          maxLength: 7

    PaginatedTagGroupResponse:
      allOf:
        - $ref: "#/components/schemas/PaginatedResponse"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/TagGroupResponse"

    PaginatedTagResponse:
      allOf:
        - $ref: "#/components/schemas/PaginatedResponse"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/TagResponse"

    # ========= Custom Field Schemas =========

    CustomFieldDefinitionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        fieldKey:
          type: string
        fieldLabel:
          type: string
        fieldType:
          type: string
          enum:
            - TEXT
            - NUMBER
            - BOOLEAN
            - DATE
            - URL
            - EMAIL
            - PHONE
            - SELECT
            - MULTI_SELECT
            - FILE
        isRequired:
          type: boolean
        options:
          type: array
          items:
            type: string
        displayOrder:
          type: integer
        referenceCount:
          type: integer
          format: int64
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"

    CustomFieldGroupResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        entityType:
          type: string
        fields:
          type: array
          items:
            $ref: "#/components/schemas/CustomFieldDefinitionResponse"
        referenceCount:
          type: integer
          format: int64
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"

    CreateCustomFieldDefinitionRequest:
      type: object
      required:
        - fieldKey
        - fieldLabel
        - fieldType
      properties:
        fieldKey:
          type: string
          maxLength: 100
        fieldLabel:
          type: string
          maxLength: 255
        fieldType:
          type: string
          enum:
            - TEXT
            - NUMBER
            - BOOLEAN
            - DATE
            - URL
            - EMAIL
            - PHONE
            - SELECT
            - MULTI_SELECT
            - FILE
        isRequired:
          type: boolean
          default: false
        options:
          type: array
          items:
            type: string
        displayOrder:
          type: integer
          default: 0

    UpdateCustomFieldDefinitionRequest:
      type: object
      properties:
        fieldLabel:
          type: string
          nullable: true
          maxLength: 255
        fieldType:
          type: string
          nullable: true
          enum:
            - TEXT
            - NUMBER
            - BOOLEAN
            - DATE
            - URL
            - EMAIL
            - PHONE
            - SELECT
            - MULTI_SELECT
            - FILE
        isRequired:
          type: boolean
          nullable: true
        options:
          type: array
          nullable: true
          items:
            type: string
        displayOrder:
          type: integer
          nullable: true

    CreateCustomFieldGroupRequest:
      type: object
      required:
        - name
        - entityType
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
        entityType:
          type: string
        fieldIds:
          type: array
          items:
            type: string
            format: uuid

    UpdateCustomFieldGroupRequest:
      type: object
      properties:
        name:
          type: string
          nullable: true
          maxLength: 255
        description:
          type: string
          nullable: true
        fieldIds:
          type: array
          nullable: true
          items:
            type: string
            format: uuid

    PaginatedCustomFieldDefinitionResponse:
      allOf:
        - $ref: "#/components/schemas/PaginatedResponse"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/CustomFieldDefinitionResponse"

    PaginatedCustomFieldGroupResponse:
      allOf:
        - $ref: "#/components/schemas/PaginatedResponse"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/CustomFieldGroupResponse"

    # ========= Client Schemas =========

    Address:
      type: object
      properties:
        street:
          type: string
        city:
          type: string
        state:
          type: string
        zip:
          type: string
        country:
          type: string

    ClientResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
        email:
          type: string
        phone:
          type: string
        website:
          type: string
        billingAddress:
          $ref: "#/components/schemas/Address"
        shippingAddress:
          $ref: "#/components/schemas/Address"
        notes:
          type: string
        externalAccountingId:
          type: string
        pricingTier:
          type: string
        isActive:
          type: boolean
        tags:
          type: array
          items:
            $ref: "#/components/schemas/TagSummary"
        customFieldValues:
          type: array
          items:
            $ref: "#/components/schemas/CustomFieldValueResponse"
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"

    ClientListItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
        email:
          type: string
        phone:
          type: string
        isActive:
          type: boolean
        tags:
          type: array
          items:
            $ref: "#/components/schemas/TagSummary"
        createdAt:
          $ref: "#/components/schemas/Timestamp"

    CreateClientRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 255
        type:
          type: string
          enum:
            - COMPANY
            - INDIVIDUAL
          default: COMPANY
        email:
          type: string
        phone:
          type: string
        website:
          type: string
        billingAddress:
          $ref: "#/components/schemas/Address"
        shippingAddress:
          $ref: "#/components/schemas/Address"
        notes:
          type: string
        externalAccountingId:
          type: string
        pricingTier:
          type: string
        tagIds:
          type: array
          items:
            type: string
            format: uuid
        customFieldValues:
          type: array
          items:
            type: object
            properties:
              customFieldId:
                type: string
                format: uuid
              value:
                type: object

    UpdateClientRequest:
      type: object
      properties:
        name:
          type: string
          nullable: true
          maxLength: 255
        type:
          type: string
          nullable: true
          enum:
            - COMPANY
            - INDIVIDUAL
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        billingAddress:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/Address"
        shippingAddress:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/Address"
        notes:
          type: string
          nullable: true
        externalAccountingId:
          type: string
          nullable: true
        pricingTier:
          type: string
          nullable: true
        isActive:
          type: boolean
          nullable: true
        tagIds:
          type: array
          nullable: true
          items:
            type: string
            format: uuid
        customFieldValues:
          type: array
          nullable: true
          items:
            type: object
            properties:
              customFieldId:
                type: string
                format: uuid
              value:
                type: object

    SearchClientsRequest:
      type: object
      properties:
        query:
          type: string
        type:
          type: string
        isActive:
          type: boolean
        tagIds:
          type: array
          items:
            type: string
            format: uuid
        customFieldFilters:
          type: array
          items:
            $ref: "#/components/schemas/CustomFieldFilter"
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        sortBy:
          type: string
        order:
          type: string
          enum: [asc, desc]

    CustomFieldFilter:
      type: object
      properties:
        fieldId:
          type: string
          format: uuid
        op:
          type: string
          enum: [eq, gte, lte, gt, lt, contains]
        value:
          type: object

    PaginatedClientResponse:
      allOf:
        - $ref: "#/components/schemas/PaginatedResponse"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/ClientListItem"

